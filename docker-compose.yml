version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: training-data-bot-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LLM_API_KEY=${LLM_API_KEY:-replace_me}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - CHUNK_SIZE=${CHUNK_SIZE:-1200}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-150}
      - MAX_WORKERS=${MAX_WORKERS:-4}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: training-data-bot-ui
    ports:
      - "8501:8501"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_HOST=api
      - API_PORT=8000
      - LLM_API_KEY=${LLM_API_KEY:-replace_me}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  data:
    driver: local
